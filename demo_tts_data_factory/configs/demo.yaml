input_mode: single
text: "雨夜的公交站挤着刚下班的人群，路边车流一阵接一阵地压过积水，远处偶尔传来短促的喇叭声。林夏把湿透的外套攥在手里，声音发抖却压得很低：你为什么又骗我？周屿往前逼近半步，鞋底踩过水洼，又立刻停住：我没有骗你，我只是没来得及说。林夏冷笑了一声，身后人群的低语像潮水一样漫过来：没来得及？你到底还想瞒我到什么时候？周屿沉重地吸了一口气，街口红灯亮起，车声忽然更近。"
scene: rainy_street_chat
emotion: angry
allowed_events:
  - cup_hit
  - cloth_rustle
  - chair_move
  - door_close_hard
  - footsteps_fast
  - sigh
  - breath_heavy
  - rain_light
  - street_noise
  - crowd_murmur
  - car_passby_wet
  - horn_short
  - bus_arrive
  - puddle_step
  - wind_light
clean_voice_path:
sfx_manifest_path: assets/sfx/manifest.json
sample_rate: 24000
channels: 1
output_dir: output
batch_input_path: examples/demo_inputs.jsonl
scene_templates_path: configs/scene_templates.yaml
enhancer: rule_based
llm_enhancer:
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1
  model: gpt-4o-mini
  temperature: 0.2
tts_provider: mock
openai_tts:
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1
  model: gpt-4o-mini-tts
  voice: coral
  instructions: "Speak naturally in Mandarin Chinese with clear emotion, like an audio drama actor."
  response_format: wav
  speed: 1.0
mix:
  speech_gain_db: 0.0
  default_ducking_db: -4.0
  fade_ms: 15
  background_gain_db: -18.0
merge:
  enabled: true
  same_event_gap_ms: 350
  cloth_rustle_merge_gap_ms: 700
style:
  enable_keyword_style: true
  enable_brief_style: true
asset_scan:
  audio_extensions: [".wav", ".mp3", ".flac"]
  auto_intensity: true
  preserve_manual_overrides: true
asset_selection:
  strategy: weighted_top_k
  top_k: 3
  avoid_recent: true
  recent_window: 6
background_scheduler:
  enabled: true
  max_background_layers: 4
  max_accent_events: 5
  min_gap_ms: 3000
  random_offset_ms: 1200
loudness:
  enabled: true
  target_speech_peak_dbfs: -3.0
  max_mix_peak_dbfs: -1.0
  background_headroom_db: 14.0
  max_loudness_compensation_db: 6.0
variants:
  enabled: true
  names: [subtle, balanced, cinematic]
random_seed: 42
