input_mode: batch
text: ""
scene: indoor_argument
emotion: angry
allowed_events:
  - cup_hit
  - cloth_rustle
  - chair_move
  - door_close_hard
  - footsteps_fast
  - sigh
  - breath_heavy
  - rain_light
  - street_noise
  - crowd_murmur
clean_voice_path:
sfx_manifest_path: assets/sfx/manifest.json
sample_rate: 24000
channels: 1
output_dir: output
batch_input_path: examples/demo_inputs.jsonl
scene_templates_path: configs/scene_templates.yaml
enhancer: rule_based
llm_enhancer:
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1
  model: gpt-4o-mini
  temperature: 0.2
tts_provider: mock
openai_tts:
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1
  model: gpt-4o-mini-tts
  voice: coral
  instructions: "Speak naturally in Mandarin Chinese with clear emotion, like an audio drama actor."
  response_format: wav
  speed: 1.0
mix:
  speech_gain_db: 0.0
  default_ducking_db: -4.0
  fade_ms: 15
  background_gain_db: -18.0
merge:
  enabled: true
  same_event_gap_ms: 350
  cloth_rustle_merge_gap_ms: 700
style:
  enable_keyword_style: true
  enable_brief_style: true
random_seed: 42
