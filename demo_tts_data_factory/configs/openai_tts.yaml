input_mode: single
text: "夜里的街口车流没有停，雨后的路面反着红绿灯的光。林夏攥着手机站在便利店门口，声音压得很低：你为什么一定要瞒着我？周屿把外套拉紧，避开她的眼神：我不是故意的，我只是怕你担心。林夏往前逼近一步：怕我担心，所以你就一个人去见他？你到底把我当什么？一辆车从他们身边急促驶过，水声溅到台阶上。周屿终于抬起头：我没有背叛你，我是在保护你。林夏冷笑了一声：保护？你连一句实话都不肯给我，还说保护我？周屿沉默了几秒，声音发哑：如果我说出来，你现在只会更危险。林夏的手微微发抖：那你就让我站在这里，像个傻子一样猜？你有没有想过，我最怕的不是危险，是你什么都不告诉我。"
scene: street_argument
emotion: angry
allowed_events:
  - cup_hit
  - cloth_rustle
  - chair_move
  - door_close_hard
  - footsteps_fast
  - sigh
  - breath_heavy
  - rain_light
  - street_noise
  - crowd_murmur
clean_voice_path:
sfx_manifest_path: assets/sfx/manifest.json
sample_rate: 24000
channels: 1
output_dir: output
batch_input_path: examples/demo_inputs.jsonl
scene_templates_path: configs/scene_templates.yaml
enhancer: llm
llm_enhancer:
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1
  model: gpt-4o-mini
  temperature: 0.2
tts_provider: openai
openai_tts:
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1
  model: gpt-4o-mini-tts
  voice: coral
  instructions: "Speak naturally in Mandarin Chinese with tense, angry emotion, like an audio drama actor."
  response_format: wav
  speed: 1.0
mix:
  speech_gain_db: 0.0
  default_ducking_db: -4.0
  fade_ms: 15
  background_gain_db: -18.0
merge:
  enabled: true
  same_event_gap_ms: 350
  cloth_rustle_merge_gap_ms: 700
style:
  enable_keyword_style: true
  enable_brief_style: true
random_seed: 42
