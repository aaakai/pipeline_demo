indoor_argument:
  allowed_foreground_events:
    - cup_hit
    - cloth_rustle
    - chair_move
    - door_close_hard
    - footsteps_indoor
    - phone_vibrate
    - sigh
    - breath_heavy
  allowed_background_events:
    - room_tone
    - air_conditioner_hum
  default_background_events:
    - room_tone
  max_foreground_events: 5
  max_total_events: 8
  max_strong_events: 2
  overlap_policy:
    foreground_can_overlap_speech: true
    background_can_overlap_speech: true
  emotion_bias:
    neutral:
      room_tone: 0.4
      cloth_rustle: 0.3
    angry:
      cup_hit: 1.0
      chair_move: 0.8
      breath_heavy: 0.7
      door_close_hard: 0.7
    sad:
      sigh: 1.0
      cloth_rustle: 0.7
    tense:
      phone_vibrate: 0.5
      footsteps_indoor: 0.4
  event_density_level: medium

