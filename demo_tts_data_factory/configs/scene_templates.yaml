indoor_argument:
  allowed_foreground_events:
    - cup_hit
    - cloth_rustle
    - chair_move
    - door_close_hard
    - sigh
    - breath_heavy
  allowed_background_events:
    - crowd_murmur
  default_background_events: []
  max_foreground_events: 5
  max_total_events: 7
  max_strong_events: 2
  overlap_policy:
    foreground_can_overlap_speech: true
    background_can_overlap_speech: true
  emotion_bias:
    angry:
      cup_hit: 1.0
      chair_move: 0.8
      breath_heavy: 0.7
    sad:
      sigh: 1.0
      cloth_rustle: 0.7
  event_density_level: medium

office_talk:
  allowed_foreground_events:
    - cloth_rustle
    - chair_move
    - sigh
  allowed_background_events:
    - crowd_murmur
  default_background_events: []
  max_foreground_events: 3
  max_total_events: 4
  max_strong_events: 1
  overlap_policy:
    foreground_can_overlap_speech: true
    background_can_overlap_speech: true
  emotion_bias:
    neutral:
      cloth_rustle: 0.6
    tired:
      sigh: 1.0
  event_density_level: low

